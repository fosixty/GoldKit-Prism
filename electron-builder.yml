appId: com.goldkit.prism
productName: Prism
copyright: Copyright © 2026 GoldKit

directories:
  output: dist
  buildResources: build

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!scripts/*'
  - '!native/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'

extraResources:
  - from: build/icon.ico
    to: icon.ico

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  verifyUpdateCodeSignature: false
  extraResources:
    - from: resources/ptformat/win32
      to: ptformat/win32
    - from: resources/bin
      to: bin
      filter:
        - ptx-json.exe

mac:
  target:
    - target: dmg
      arch:
        - x64
  icon: build/prismlogo.png
  category: public.app-category.music
  extraResources:
    - from: resources/ptformat/darwin-x64
      to: ptformat/darwin-x64
    - from: resources/bin
      to: bin
      filter:
        - ptx-json

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build/prismlogo.png
  category: Audio
  extraResources:
    - from: resources/ptformat/linux-x64
      to: ptformat/linux-x64
    - from: resources/bin
      to: bin
      filter:
        - ptx-json

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-Setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: GoldKit Prism
  createDesktopShortcut: always
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

dmg:
  artifactName: ${productName}-${version}-mac-x64.${ext}

appImage:
  artifactName: ${productName}-${version}.${ext}
