name: Build and Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app icon
        run: npm run build:icon

      - name: Build ptformat (verify win32 bundle)
        run: npm run build:ptformat

      - name: Build native helpers
        run: npm run build:native

      - name: Build app
        run: npm run build

      - name: Package Windows installer
        run: npx electron-builder --win --x64 --publish never --config electron-builder.yml

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prism-windows
          path: dist/*
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app icon
        run: npm run build:icon

      - name: Build ptformat (darwin-x64)
        run: npm run build:ptformat

      - name: Verify ptformat architecture
        run: file resources/ptformat/darwin-x64/ptformat

      - name: Build native helpers
        run: npm run build:native

      - name: Build app
        run: npm run build

      - name: Package macOS Intel DMG
        run: npx electron-builder --mac --x64 --publish never --config electron-builder.yml

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prism-macos-x64
          path: dist/*
          if-no-files-found: error

  release:
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/master' ||
       startsWith(github.ref, 'refs/tags/v'))
    needs: [build-win, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'beta' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && format('Prism {0}', github.ref_name) || 'Prism Beta' }}
          prerelease: true
          make_latest: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.yml
            artifacts/**/*.blockmap
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
